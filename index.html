<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Portfolio - Augusto Baldino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="person">
        <div class="person-content">
            <div class="person-name">
                <h1>Olá, <span></span></h1>

                <h1>Augusto Baldino <span></span></h1>
            </div>
            <div class="stacks-content">
                <h3>Techs: </h3>

                <div class="stacks">
                    <ul>
                        <li>
                            <div data="Java">
                                <img src="svg/java-icon.svg" alt="java-icon">

                        </li>
                    </ul>
                    <ul>
                        <li>
                            <div data="Spring-Boot">
                                <img src="svg/springio-icon.svg" alt="Spring-icon">

                    </ul>
                    <ul>

                    <ul>
                        <li>
                            <div data="NodeJS">

                    </ul>
                    <ul>
                        <li>
                            <div data="Python">
                                <img src="svg/python-icon.svg" alt="Python-icon">

            </div>
        </div>
        <div class="person-background">
              <div class="wrapper-profile-photo">
                <img class="profile-photo" src="img/foto-perfil-1.jpg" alt="Foto_Augusto_Baldino">
              </div>

              <div class="links">
                <a href="https://github.com/AugustoPBaldino" target="_blank">
                    <img src="svg/icons8-github.svg" alt="Icone Github">
                </a>
                <a href="https://www.linkedin.com/in/augusto-baldino-730ba1248/" target="_blank">
                    <img src="svg/linkedin-icon.svg" alt="Icone Linkedin">
                </a>

                
              </div>
        </div>

</html>
